<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <script>
    let add=(a,b)=>a+b;
    let sub=(a,b)=>a-b;
    let mul=(a,b)=>a*b;
    let div=(a,b)=>a/b;

    function calc(n1,n2,opcb) {
        return opcb(n1,n2);
    }
    function run() {
        let a=Number(document.getElementById("n1").value);
        let b=Number(document.getElementById("n2").value);
        let op=document.getElementById("op").value;
        let res;

        switch(op) {
            case 'add':res=calc(a,b,add); break;
            case 'sub':res=calc(a,b,sub); break;

        }
        
    document.getElementById("res").textContent="result:"+res;
    }
   </script> 
   <input type="number" id="n1" placeholder="enter number 1">
   <input type="number" id="n2" placeholder="enter number 2">
   <br>
   <select  id="op">
    <option value="add">+</option>
    <option value="sub">-</option>
   </select>
   <button onclick="run()">calculate</button>
   <p id="res"></p>
</body>
</html>
